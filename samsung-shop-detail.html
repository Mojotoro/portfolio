<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samsung Shop </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

.container{
    padding:60px 8%;
}

.back{
    color:white;
    text-decoration:none;
    display:inline-block;
    margin-bottom:60px;
}

.title{
    margin-bottom:50px;
}

.title span{
    color:#aaa;
    font-size:14px;
}

.title h1{
    font-size:64px;
    margin-top:10px;
}

.main-image{
    width:100%;
    height:75vh;
    object-fit:cover;
    margin-bottom:40px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    height:300px;
    object-fit:cover;
    border:1px solid #333;
}

.info{
    margin:70px 0;
    max-width:900px;
}

.info h2{
    font-size:32px;
    margin-bottom:20px;
}

.info p{
    color:#ccc;
    line-height:1.8;
    font-size:18px;
}

@media(max-width:768px){
    .title h1{
        font-size:42px;
    }

    .main-image{
        height:45vh;
    }
}
.gallery img{
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox-content{
    max-width:90%;
    max-height:90%;
    object-fit:contain;
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    font-size:50px;
    color:white;
    cursor:pointer;
}
.breadcrumb a{
    color:#d9d9d9;
    text-decoration:none;
}

.breadcrumb span{
    color:#d9d9d9;
}
</style>
</head>

<body>

    <div class="container">

    <div class="breadcrumb">

    <a href="index.html">Home</a>

    <span>/</span>

    <a href="Pop Up Shop.html">Project</a>

    </div>

    <div class="title">
        <span>INTERIOR DESIGNER / ONE BANGKOK</span>
        <h1>SAMSUNG SHOP</h1>
    </div>

    <img src="images/shop/samsung0.webp" class="main-image" alt="Samsung Shop Cover">

    <div class="info">
        <h2>Project Gallery</h2>
        <p>
            ออกแบบพื้นที่ขาย Samsung ให้สินค้าโดดเด่น ลูกค้าเดินชมได้สะดวก และสื่อภาพลักษณ์แบรนด์ผ่านแสง display และจังหวะของพื้นที่
        </p>
    </div>

    <div class="gallery">
        <img src="images/shop/samsung1.webp" alt="Samsung Shop 1">
        <img src="images/shop/samsung2.webp" alt="Samsung Shop 2">
        <img src="images/shop/samsung3.webp" alt="Samsung Shop 3">
        <img src="images/shop/samsung4.jpg" alt="Samsung Shop 4">
        <img src="images/shop/samsung5.jpg" alt="Samsung Shop 5">
        <img src="images/shop/samsung6.jpg" alt="Samsung Shop 6">
    </div>

<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
</div>

    <script>

    const galleryImages = document.querySelectorAll('.gallery img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.querySelector('.close');

    galleryImages.forEach(img => {

        img.addEventListener('click', () => {

            lightbox.style.display = 'flex';
            lightboxImg.src = img.src;

        });

    });

    closeBtn.addEventListener('click', () => {

        lightbox.style.display = 'none';

    });

    lightbox.addEventListener('click', (e) => {

        if(e.target === lightbox){
            lightbox.style.display = 'none';
        }

    });

    </script>
</div>

</body>
</html>
