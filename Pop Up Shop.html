<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pop Up Shop</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
}

.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 8%;
    background: linear-gradient(to right, #0f0f0f 35%, rgba(15,15,15,0.2)),
    url("images/shop/samsung0.webp") center/cover;
}

.hero h1{
    font-size:70px;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:80px;
}

.info{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:60px;
}

.info div{
    border-top:1px solid #444;
    padding-top:15px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.gallery img{
    width:100%;
    display:block;
}

.back{
    display:inline-block;
    margin-bottom:40px;
    color:white;
    text-decoration:none;
}
.info-link{
    text-decoration:none;
    color:white;
    display:block;
}

.info-link:hover{
    color:#d4af37;
}
.info a{
    color:white;
    text-decoration:none;
}

.info a:hover{
    color:#cccccc;
}
.breadcrumb{
    margin-bottom:20px;
    font-size:14px;
}

.breadcrumb a,
.breadcrumb span{
    color:#bfbfbf;
    text-decoration:none;
}

.breadcrumb a:hover{
    color:white;
}
</style>

</head>

<body>

<div class="container">

    <div class="breadcrumb">

    <a href="index.html">Home</a>

</div>

<div class="hero">

    <h1>Pop Up Shop</h1>

</div>

<div class="container">

    <div class="info">

        <div>
            <small>Project Type</small>
            <h3><a href="samsung-shop-detail.html">
            Samsung Shop
            </a>
            </h3>
        </div>

        <div>
            <small>Project Type</small>
            <h3><a href="onebangkok.html" class="info-link">
            ONE Bangkok
            </a>
            </h3>
        </div>

        <div>
            <small>Role</small>
            <h3>Interior Designer</h3>
        </div>

        <div>
            <small>Status</small>
            <h3>Concept Design</h3>
        </div>

    </div>

    
       <h2>Project Overview</h2>

    <p>
        ออกแบบป๊อปอัปช็อปให้หน้าร้านจดจำง่าย แสดงสินค้าได้เด่น และพาลูกค้าเข้าถึงแบรนด์ได้รวดเร็ว
    </p>

    <br><br>

    <div class="Pop Up Shop">

        <img src="office1.jpg">
        <img src="office2.jpg">
        <img src="office3.jpg">
        <img src="office4.jpg">

    </div>

</div>

</body>
</html>
